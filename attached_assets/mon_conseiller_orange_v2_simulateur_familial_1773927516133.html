
<div id="app" style="max-width: 420px; margin: 0 auto; padding: 1rem 0;">
  <div style="border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-xl); overflow: hidden; background: var(--color-background-primary);">
    <div style="background: #FF7900; padding: 12px 16px; display: flex; align-items: center; gap: 10px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span style="font-size: 15px; font-weight: 500; color: #fff; flex: 1;">Mon conseiller Orange</span>
      <span id="stepTag" style="font-size: 11px; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 10px;"></span>
    </div>
    <div id="content" style="padding: 16px; min-height: 460px;"></div>
  </div>
  <p style="text-align: center; font-size: 12px; color: var(--color-text-tertiary); margin-top: 10px;">Prototype v2 — simulateur familial + comparaison</p>
</div>

<script>
const S = {
  step: 0,
  membres: [],
  currentMembre: null,
  operateurActuel: null,
  prixActuel: null,
  reco: null,
  showAlt: false
};

const usages = [
  {id:'streaming', icon:'▶', label:'Streaming', desc:'Netflix, YouTube...'},
  {id:'gaming', icon:'⌘', label:'Gaming', desc:'Jeux en ligne'},
  {id:'teletravail', icon:'◉', label:'Visio / télétravail', desc:'Teams, Zoom...'},
  {id:'basique', icon:'○', label:'Basique', desc:'Mails, réseaux sociaux'}
];

function tag(t){ document.getElementById('stepTag').textContent = t; }

function bubble(type, html){
  const isAI = type === 'ai';
  return `<div style="display: flex; gap: 8px; margin-bottom: 14px; flex-direction: ${isAI?'row':'row-reverse'};">
    ${isAI ? `<div style="min-width: 28px; width: 28px; height: 28px; border-radius: 50%; background: #FF7900; display: flex; align-items: center; justify-content: center; margin-top: 2px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>` : ''}
    <div style="max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; color: var(--color-text-primary);
      ${isAI ? 'background: var(--color-background-secondary); border-bottom-left-radius: 4px;' : 'background: #FF7900; color: #fff; border-bottom-right-radius: 4px;'}
    ">${html}</div>
  </div>`;
}

function actionBtn(label, onclick, primary=false){
  return `<button onclick="${onclick}" style="padding: 9px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; border: ${primary ? 'none' : '0.5px solid var(--color-border-secondary)'}; background: ${primary ? '#FF7900' : 'var(--color-background-primary)'}; color: ${primary ? '#fff' : 'var(--color-text-primary)'}; margin: 3px 4px 3px 0;">${label}</button>`;
}

function calcReco(){
  const n = S.membres.length;
  const allUsages = S.membres.flatMap(m => m.usages);
  const hasGaming = allUsages.includes('gaming');
  const hasTeletravail = allUsages.includes('teletravail');
  const hasStreaming = allUsages.includes('streaming');
  const heavy = hasGaming || hasTeletravail;

  let main, alt;
  if(heavy && n >= 3){
    main = {name:'Livebox Max + Pack Open', promo:54.99, full:72.99, desc:'Fibre 5 Gbit/s sym. + Wi-Fi 6E + répéteur', why:[
      `Débit symétrique pour ${hasGaming?'le gaming':'la visio'} sans lag, même à ${n} simultanés`,
      `Wi-Fi 6E + répéteur : couverture optimale pour ${n} personnes`,
      'Remise Open : -12€/mois par ligne mobile ajoutée'
    ], inclus:['Fibre 5 Gbit/s ↓↑','Répéteur Wi-Fi 6E','TV 4K (désactivable)','Appels illim.']};
    alt = {name:'Livebox Up + Pack Open', promo:44.99, full:62.99, desc:'Fibre 2 Gbit/s + Wi-Fi 6 + répéteur', compromise:
      `Débit 2 Gbit/s au lieu de 5 — suffisant pour le streaming, mais ${hasGaming?'latence un peu plus haute en gaming compétitif':'visio peut saturer si tout le foyer streame en même temps'}.`
    };
  } else if(heavy){
    main = {name:'Livebox Max', promo:34.99, full:54.99, desc:'Fibre 5 Gbit/s sym. + Wi-Fi 6E', why:[
      `Débit symétrique optimal pour ${hasGaming?'le gaming':'le télétravail'}`,
      'Latence réduite vs Livebox standard',
      'Meilleur rapport perf/prix pour usage intensif solo'
    ], inclus:['Fibre 5 Gbit/s ↓↑','Wi-Fi 6E','Appels illim.']};
    alt = {name:'Livebox', promo:24.99, full:42.99, desc:'Fibre 500 Mbit/s + Wi-Fi 5', compromise:
      `500 Mbit/s couvre la navigation et le streaming classique, mais ${hasGaming?'la latence gaming sera sensiblement plus élevée — vous le sentirez en jeu compétitif.':'la visio peut devenir instable si vous téléchargez en même temps.'}`
    };
  } else if(n >= 3){
    main = {name:'Livebox Up + Pack Open', promo:44.99, full:62.99, desc:'Fibre 2 Gbit/s + Wi-Fi 6 + répéteur', why:[
      `2 Gbit/s partagés entre ${n} personnes = confortable`,
      'Répéteur Wi-Fi inclus pour couvrir toute la maison',
      'Remise Open : -12€/mois par ligne mobile'
    ], inclus:['Fibre 2 Gbit/s','Répéteur Wi-Fi 6','160 chaînes TV','Appels illim.']};
    alt = {name:'Livebox + Pack Open', promo:34.99, full:52.99, desc:'Fibre 500 Mbit/s + Wi-Fi 5', compromise:
      `500 Mbit/s pour ${n} personnes, ça peut saturer aux heures de pointe (soirée, tout le monde connecté). Pas de répéteur Wi-Fi inclus non plus.`
    };
  } else {
    main = {name:'Livebox', promo:24.99, full:42.99, desc:'Fibre 500 Mbit/s + Wi-Fi 5', why:[
      'Suffisant pour votre usage quotidien',
      'Le meilleur prix, sans options superflues',
      'Pas de surcoût pour du débit que vous n\'utiliserez pas'
    ], inclus:['Fibre 500 Mbit/s','Wi-Fi 5','Appels illim. fixes','TV en option (+5€)']};
    alt = {name:'Livebox Max', promo:34.99, full:54.99, desc:'Fibre 5 Gbit/s + Wi-Fi 6E', compromise:
      'Plus de débit, mais franchement pour de la navigation et du streaming standard, vous ne verrez pas la différence au quotidien. +10€/mois en promo, +12€ en plein tarif.'
    };
  }
  main.cout12 = Math.round(main.promo*6 + main.full*6);
  main.moy = Math.round(main.cout12/12);
  alt.cout12Approx = Math.round(alt.promo*6 + alt.full*6);
  alt.moyApprox = Math.round(alt.cout12Approx/12);
  S.reco = {main, alt};
}

function render(){
  const c = document.getElementById('content');

  if(S.step === 0){
    tag('');
    c.innerHTML = `
      <div style="text-align: center; padding: 24px 0 16px;">
        <div style="width: 52px; height: 52px; border-radius: 50%; background: #FF7900; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <h2 style="font-size: 19px; font-weight: 500; margin: 0 0 6px; color: var(--color-text-primary);">Simulateur familial</h2>
        <p style="font-size: 13.5px; color: var(--color-text-secondary); margin: 0 0 6px; line-height: 1.5;">Configurez chaque membre de votre foyer.<br>Obtenez une offre groupée optimale + comparaison.</p>
        <p style="font-size: 12px; color: var(--color-text-tertiary); margin: 0 0 22px;">Version enrichie du conseiller IA</p>
        <button onclick="S.step=1;S.currentMembre={nom:'',usages:[]};render()" style="background: #FF7900; color: #fff; border: none; padding: 12px 32px; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer;">Commencer</button>
      </div>`;
    return;
  }

  if(S.step === 1){
    const num = S.membres.length + 1;
    tag('Membre ' + num);
    let prev = '';
    if(S.membres.length > 0){
      prev = bubble('ai', `${S.membres.length === 1 ? 'Parfait, premier membre enregistré' : S.membres.length + ' membres enregistrés'}. On passe au suivant ?`);
    } else {
      prev = bubble('ai', 'Commençons par configurer les membres de votre foyer un par un. Qui est la première personne ?');
    }
    c.innerHTML = prev + `
      <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 14px; margin-bottom: 12px;">
        <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 8px; font-weight: 500;">Membre ${num}</p>
        <input type="text" id="nom" placeholder="Prénom ou surnom (ex: Maman, Mathis...)" style="width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 13px;">
        <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 8px;">Usages principaux :</p>
        <div id="usagePicks" style="display: flex; flex-wrap: wrap; gap: 6px;"></div>
      </div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        ${actionBtn('Ajouter ce membre', 'addMembre()', true)}
        ${S.membres.length >= 2 ? actionBtn('Terminer → voir la reco', 'finishMembres()') : ''}
      </div>
      ${S.membres.length > 0 ? `<div style="margin-top: 14px; padding: 10px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md);">
        <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 6px; font-weight: 500;">Déjà ajoutés :</p>
        ${S.membres.map((m,i) => `<div style="font-size: 12px; color: var(--color-text-secondary); padding: 2px 0;">${m.nom} — ${m.usages.map(u=>usages.find(x=>x.id===u).label).join(', ')}</div>`).join('')}
      </div>` : ''}
    `;
    const picks = document.getElementById('usagePicks');
    S.currentMembre = {nom:'', usages:[]};
    usages.forEach(u => {
      const b = document.createElement('button');
      b.textContent = u.icon + ' ' + u.label;
      b.style.cssText = 'padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary);';
      let sel = false;
      b.onclick = () => {
        sel = !sel;
        if(sel){ S.currentMembre.usages.push(u.id); b.style.background='#FFF0E0'; b.style.borderColor='#FF7900'; b.style.color='#E65100'; }
        else { S.currentMembre.usages = S.currentMembre.usages.filter(x=>x!==u.id); b.style.background='var(--color-background-primary)'; b.style.borderColor='var(--color-border-tertiary)'; b.style.color='var(--color-text-primary)'; }
      };
      picks.appendChild(b);
    });
    return;
  }

  if(S.step === 2){
    tag('Opérateur actuel');
    c.innerHTML = bubble('ai', `Bien, ${S.membres.length} membre${S.membres.length>1?'s':''} configuré${S.membres.length>1?'s':''}. Dernière question : vous êtes chez quel opérateur actuellement, et combien payez-vous à peu près par mois au total (box + mobiles) ?`) + `
      <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 14px; margin-bottom: 12px;">
        <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 8px; font-weight: 500;">Opérateur box actuel</p>
        <div id="opPicks" style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;"></div>
        <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 8px; font-weight: 500;">Budget mensuel actuel (box + tous les mobiles)</p>
        <div style="display: flex; align-items: center; gap: 10px;">
          <input type="range" id="prixSlider" min="20" max="150" value="70" step="5" style="flex: 1;">
          <span id="prixVal" style="font-size: 15px; font-weight: 500; min-width: 50px; color: var(--color-text-primary);">70€</span>
        </div>
      </div>
      <div>${actionBtn('Voir ma recommandation', 'submitOp()', true)}</div>`;
    const sl = document.getElementById('prixSlider');
    const pv = document.getElementById('prixVal');
    sl.oninput = () => { pv.textContent = sl.value + '€'; };
    const opP = document.getElementById('opPicks');
    ['SFR','Free','Bouygues','Sosh','Autre'].forEach(op => {
      const b = document.createElement('button');
      b.textContent = op;
      b.style.cssText = 'padding: 7px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary);';
      b.onclick = () => {
        opP.querySelectorAll('button').forEach(x => { x.style.background='var(--color-background-primary)'; x.style.borderColor='var(--color-border-tertiary)'; x.style.color='var(--color-text-primary)'; });
        b.style.background='#FFF0E0'; b.style.borderColor='#FF7900'; b.style.color='#E65100';
        S.operateurActuel = op;
      };
      opP.appendChild(b);
    });
    return;
  }

  if(S.step === 3){
    tag('Recommandation');
    const r = S.reco.main;
    const a = S.reco.alt;
    const prixActuel = S.prixActuel;
    const diff = prixActuel - r.moy;
    const diffSign = diff > 0 ? 'économie' : 'supplément';
    const diffAbs = Math.abs(diff);

    c.innerHTML = bubble('ai', `D'après votre configuration (${S.membres.map(m=>m.nom).join(', ')}), voici l'offre la plus adaptée à votre foyer.`) + `

      <div style="border: 2px solid #FF7900; border-radius: var(--border-radius-lg); padding: 14px; margin-bottom: 12px; background: var(--color-background-primary);">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
          <div>
            <span style="font-size: 11px; background: #FF7900; color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 500;">Recommandé pour vous</span>
            <h3 style="font-size: 16px; font-weight: 500; margin: 8px 0 2px; color: var(--color-text-primary);">${r.name}</h3>
            <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0;">${r.desc}</p>
          </div>
          <div style="text-align: right; min-width: 75px;">
            <span style="font-size: 20px; font-weight: 500; color: #FF7900;">${r.promo}€</span><br>
            <span style="font-size: 11px; color: var(--color-text-tertiary);">puis ${r.full}€/mois</span>
          </div>
        </div>
        ${r.inclus.map(i => `<div style="font-size: 12px; color: var(--color-text-secondary); padding: 2px 0;">✓ ${i}</div>`).join('')}
      </div>

      <div style="background: #FFF8F0; border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 12px;">
        <p style="font-size: 12px; font-weight: 500; color: #E65100; margin: 0 0 6px;">Pourquoi cette offre pour votre foyer ?</p>
        ${r.why.map(w => `<p style="font-size: 12px; color: #BF360C; margin: 0; padding: 2px 0; line-height: 1.4;">→ ${w}</p>`).join('')}
      </div>

      <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 12px;">
        <p style="font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 8px;">Comparaison avec votre situation actuelle</p>
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
          <div style="flex: 1; padding: 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); text-align: center;">
            <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 4px;">${S.operateurActuel} (actuel)</p>
            <p style="font-size: 18px; font-weight: 500; margin: 0; color: var(--color-text-primary);">${prixActuel}€<span style="font-size: 11px; color: var(--color-text-tertiary);">/mois</span></p>
          </div>
          <div style="flex: 1; padding: 8px; border-radius: var(--border-radius-md); border: 0.5px solid #FF7900; text-align: center; background: #FFF8F0;">
            <p style="font-size: 11px; color: #E65100; margin: 0 0 4px;">Orange (moy. 12 mois)</p>
            <p style="font-size: 18px; font-weight: 500; margin: 0; color: #FF7900;">${r.moy}€<span style="font-size: 11px; color: #E65100;">/mois</span></p>
          </div>
        </div>
        <div style="text-align: center; padding: 6px; border-radius: var(--border-radius-md); background: ${diff > 0 ? '#E8F5E9' : '#FFF3E0'};">
          <span style="font-size: 13px; font-weight: 500; color: ${diff > 0 ? '#2E7D32' : '#E65100'};">${diff > 0 ? '↓' : '↑'} ${diffAbs}€/mois d'${diffSign} ${diff > 0 ? `(${Math.round(diffAbs*12)}€/an)` : ''}</span>
        </div>
      </div>

      <div style="background: #E8F5E9; border-radius: var(--border-radius-md); padding: 10px 14px; margin-bottom: 12px; display: flex; gap: 8px; align-items: start;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" style="min-width: 16px; margin-top: 1px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <p style="font-size: 12px; color: #1B5E20; margin: 0; line-height: 1.4;"><strong>Garantie 30 jours satisfait.</strong> Si l'offre ne vous convient pas, basculez vers une autre sans frais ni engagement pendant le premier mois.</p>
      </div>

      <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;">
        ${actionBtn('Souscrire cette offre', 'S.step=5;render()', true)}
        ${actionBtn('Voir l\'option moins chère', 'S.showAlt=true;S.step=4;render()')}
      </div>
      <div>${actionBtn('Recommencer', 'resetAll()')}</div>
    `;
    return;
  }

  if(S.step === 4){
    tag('Alternative');
    const r = S.reco.main;
    const a = S.reco.alt;
    c.innerHTML = bubble('ai', `Vous m'avez demandé l'option moins chère. Voici le compromis en toute transparence :`) + `

      <div style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; margin-bottom: 12px; background: var(--color-background-primary);">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
          <div>
            <span style="font-size: 11px; background: var(--color-background-secondary); color: var(--color-text-secondary); padding: 2px 8px; border-radius: 10px; font-weight: 500;">Alternative</span>
            <h3 style="font-size: 16px; font-weight: 500; margin: 8px 0 2px; color: var(--color-text-primary);">${a.name}</h3>
            <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0;">${a.desc}</p>
          </div>
          <div style="text-align: right; min-width: 75px;">
            <span style="font-size: 20px; font-weight: 500; color: var(--color-text-primary);">${a.promo}€</span><br>
            <span style="font-size: 11px; color: var(--color-text-tertiary);">puis ${a.full}€/mois</span>
          </div>
        </div>
      </div>

      <div style="background: #FFF3E0; border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 12px;">
        <p style="font-size: 12px; font-weight: 500; color: #E65100; margin: 0 0 6px;">Ce que vous gagnez et ce que vous perdez</p>
        <p style="font-size: 12px; color: #BF360C; margin: 0 0 8px; line-height: 1.4;">↓ <strong>Économie :</strong> ${Math.round(r.moy - a.moyApprox)}€/mois en moyenne (${Math.round((r.moy - a.moyApprox)*12)}€/an)</p>
        <p style="font-size: 12px; color: #BF360C; margin: 0; line-height: 1.4;">↑ <strong>Compromis :</strong> ${a.compromise}</p>
      </div>

      ${bubble('ai', `Pour être transparent : si votre priorité c'est le budget et que ${S.membres.some(m=>m.usages.includes('gaming')) ? 'personne ne joue en compétitif' : 'vos usages restent modérés'}, l'alternative peut suffire. Mais si ${S.membres.some(m=>m.usages.includes('gaming')) ? 'le gaming sans lag est important' : 'toute la famille est connectée en même temps le soir'}, la recommandation initiale vaut les ${Math.round(r.moy - a.moyApprox)}€ de plus par mois.`)}

      <div style="display: flex; flex-wrap: wrap; gap: 6px;">
        ${actionBtn('Prendre l\'alternative', 'S.step=5;render()', false)}
        ${actionBtn('Revenir à la reco initiale', 'S.step=3;render()', true)}
      </div>`;
    return;
  }

  if(S.step === 5){
    tag('');
    c.innerHTML = `
      <div style="text-align: center; padding: 32px 0;">
        <div style="width: 48px; height: 48px; border-radius: 50%; background: #E8F5E9; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h3 style="font-size: 17px; font-weight: 500; margin: 0 0 8px; color: var(--color-text-primary);">Prototype terminé</h3>
        <p style="font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; margin: 0 0 8px;">En production, le client serait redirigé vers le tunnel de souscription Orange pré-rempli avec l'offre choisie et les lignes mobiles pré-configurées.</p>
        <p style="font-size: 12px; color: var(--color-text-tertiary); margin: 0 0 20px;">Garantie 30 jours affichée à chaque étape du tunnel.</p>
        <button onclick="resetAll()" style="background: #FF7900; color: #fff; border: none; padding: 11px 28px; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer;">Recommencer la démo</button>
      </div>`;
  }
}

function addMembre(){
  const nom = document.getElementById('nom').value.trim() || ('Membre ' + (S.membres.length+1));
  if(S.currentMembre.usages.length === 0) S.currentMembre.usages = ['basique'];
  S.membres.push({nom, usages: S.currentMembre.usages});
  S.currentMembre = {nom:'', usages:[]};
  S.step = 1;
  render();
}

function finishMembres(){
  S.step = 2;
  render();
}

function submitOp(){
  if(!S.operateurActuel) S.operateurActuel = 'Votre opérateur';
  S.prixActuel = parseInt(document.getElementById('prixSlider').value);
  calcReco();
  S.step = 3;
  render();
}

function resetAll(){
  S.step=0; S.membres=[]; S.currentMembre=null; S.operateurActuel=null; S.prixActuel=null; S.reco=null; S.showAlt=false;
  render();
}

render();
</script>
